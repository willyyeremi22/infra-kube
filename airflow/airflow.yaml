---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config-api-server
  namespace: airflow
data:
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-api-server
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-api-server
  template:
    metadata:
      labels:
        app: airflow-api-server
    spec:
      serviceAccountName: airflow
      containers:
        - name: api-server
          image: apache/airflow:3.2.2-python3.14-s3-fab
          # imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: airflow-config-common
            - configMapRef:
                name: airflow-config-api-server
            - secretRef:
                name: airflow-secret
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          command:
            - airflow
          args:
            - api-server
          startupProbe:
            httpGet:
              path: /api/v2/version
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v2/version
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v2/version
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

---
apiVersion: v1
kind: Service
metadata:
  name: airflow-api-server
  namespace: airflow
spec:
  selector:
    app: airflow-api-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config-scheduler
  namespace: airflow
data:
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
  AIRFLOW__KUBERNETES_EXECUTOR__POD_TEMPLATE_FILE: /opt/airflow/pod_templates/airflow_worker.yaml

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      serviceAccountName: airflow
      containers:
        - name: scheduler
          image: apache/airflow:3.2.2-python3.14-s3-k8s
          # imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: airflow-config-common
            - configMapRef:
                name: airflow-config-scheduler
            - secretRef:
                name: airflow-secret
          volumeMounts:
            - name: pod-template
              mountPath: /opt/airflow/pod_templates
          ports:
            - containerPort: 8974
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          command:
            - airflow
          args:
            - scheduler
          startupProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - airflow jobs check --job-type SchedulerJob --hostname "$HOSTNAME"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - airflow jobs check --job-type SchedulerJob --hostname "$HOSTNAME"
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: pod-template
          configMap:
            name: airflow-worker-pod-template-1

---
apiVersion: v1
kind: Service
metadata:
  name: airflow-scheduler
  namespace: airflow
spec:
  selector:
    app: airflow-scheduler
  ports:
    - name: health
      port: 8974
      targetPort: 8974

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config-airflowignore
  namespace: airflow
data:
  .airflowignore: |
    ^\.worktrees/
    ^\.repo/

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config-dag-processor-1
  namespace: airflow
data:
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-dag-processor
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-dag-processor
  template:
    metadata:
      labels:
        app: airflow-dag-processor
    spec:
      serviceAccountName: airflow
      containers:
        - name: dag-processor
          image: apache/airflow:3.2.2-python3.14-s3-k8s
          # imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: airflow-config-common
            - configMapRef:
                name: airflow-config-dag-processor
            - secretRef:
                name: airflow-secret
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
              readOnly: true
            - name: airflowignore
              mountPath: /opt/airflow/dags/.airflowignore
              subPath: .airflowignore
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          command:
            - airflow
          args:
            - dag-processor
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: airflow-dags
        - name: airflowignore
          configMap:
            name: airflow-config-airflowignore

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config-triggerer
  namespace: airflow
data:
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-triggerer
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-triggerer
  template:
    metadata:
      labels:
        app: airflow-triggerer
    spec:
      serviceAccountName: airflow
      containers:
        - name: triggerer
          image: apache/airflow:3.2.2-python3.14-s3-k8s
          # imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: airflow-config-common
            - configMapRef:
                name: airflow-config-triggerer
            - secretRef:
                name: airflow-secret
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
              readOnly: true
            - name: airflowignore
              mountPath: /opt/airflow/dags/.airflowignore
              subPath: .airflowignore
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          command:
            - airflow
          args:
            - triggerer
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: airflow-dags
        - name: airflowignore
          configMap:
            name: airflow-config-airflowignore