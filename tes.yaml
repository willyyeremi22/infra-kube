---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-config-common
  # labels:
  #   app.kubernetes.io/name: opensearch
  #   app.kubernetes.io/part-of: opensearch-cluster
  namespace: opensearch
data:
  common.yml: |
    # =========================================================
    # COMMON CONFIG — berlaku untuk SEMUA node (manager/data/coordinator)
    # File ini akan digabung oleh initContainer dengan config
    # spesifik tiap role (lihat opensearch-configmap-<role>.yaml)
    # =========================================================
 
    # --- Cluster & node identity ---
    cluster.name: "opensearch-cluster"
    # ${HOSTNAME} otomatis di-resolve oleh OpenSearch dari env pod (nama pod StatefulSet)
    node.name: "${HOSTNAME}"
 
    # --- Network ---
    network.host: 0.0.0.0
 
    # --- Memory & storage ---
    bootstrap.memory_lock: true
    node.store.allow_mmap: true
 
    # --- Bootstrap / system security ---
    # false karena seccomp default container runtime sering memblokir syscall filter OpenSearch
    bootstrap.system_call_filter: false
 
    # --- Path (sesuaikan dengan mountPath volume/PVC di StatefulSet) ---
    path.data: /usr/share/opensearch/data
    path.logs: /usr/share/opensearch/logs
 
    # --- Gateway (hindari recovery prematur saat rolling restart) ---
    # TODO: sesuaikan angka dengan jumlah data node aktual di cluster Anda
    gateway.recover_after_data_nodes: 2
    gateway.expected_data_nodes: 3
    gateway.recover_after_time: 5m
 
    # --- Security plugin: common ---
    plugins.security.nodes_dn:
      - "CN=*.opensearch-cluster.opensearch.svc.cluster.local,OU=node,O=MyOrg,L=City,ST=State,C=ID"
    plugins.security.authcz.admin_dn:
      - "CN=admin,OU=client,O=MyOrg,L=City,ST=State,C=ID"
    plugins.security.restapi.roles_enabled:
      - "all_access"
      - "security_rest_api_access"
 
    # --- TLS transport layer (wajib aktif untuk inter-node auth) ---
    transport.ssl.enforce_hostname_verification: true
    transport.ssl.resolve_hostname: true
    plugins.security.ssl.transport.enabled: true
    plugins.security.ssl.transport.pemcert_filepath: certs/esnode.pem
    plugins.security.ssl.transport.pemkey_filepath: certs/esnode-key.pem
    plugins.security.ssl.transport.pemtrustedcas_filepath: certs/root-ca.pem
 
    # --- TLS REST layer ---
    plugins.security.ssl.http.enabled: true
    plugins.security.ssl.http.clientauth_mode: OPTIONAL
    plugins.security.ssl.http.pemcert_filepath: certs/esnode.pem
    plugins.security.ssl.http.pemkey_filepath: certs/esnode-key.pem
    plugins.security.ssl.http.pemtrustedcas_filepath: certs/root-ca.pem
 
    # =========================================================
    # OPSIONAL — nonaktif secara default, aktifkan sesuai kebutuhan.
    # Dibiarkan sebagai referensi, JANGAN uncomment tanpa alasan jelas.
    # =========================================================
    # http.cors.enabled: true
    # http.cors.allow-origin: "https://dashboards.example.com"
    # plugins.security.restapi.password_min_length: 12
    # plugins.security.audit.enable_rest: true
    # plugins.security.ssl.http.enabled_protocols: ["TLSv1.2", "TLSv1.3"]
 
    # =========================================================
    # PENTING: password (keystore_password, truststore_password,
    # pemkey_password) TIDAK boleh ditaruh di ConfigMap ini.
    # Gunakan Kubernetes Secret + volume mount terpisah, atau
    # generate sertifikat PEM tanpa passphrase untuk menghindari
    # kebutuhan pemkey_password sama sekali.
    # =========================================================
 
---
apiVersion: v1
kind: Secret
metadata:
  name: opensearc-secret
  namespace: opensearch
type: Opaque
stringData:
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: Admin!123

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-config-manager
  # labels:
  #   app.kubernetes.io/name: opensearch
  #   app.kubernetes.io/part-of: opensearch-cluster
  namespace: opensearch
data:
  manager.yml: |
    node.roles: ["cluster_manager"]

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch-cluster-manager
  # labels:
  #   app.kubernetes.io/name: opensearch
  #   app.kubernetes.io/component: master
  #   app.kubernetes.io/part-of: opensearch-cluster
  namespace: opensearch
spec:
  # serviceName: opensearch-cluster-manager-headless
  replicas: 1
  # podManagementPolicy: Parallel
  # updateStrategy:
  #   type: RollingUpdate
  selector:
    matchLabels:
      # app.kubernetes.io/name: opensearch
      # app.kubernetes.io/component: master
      app: opensearch-cluster-manager
  # volumeClaimTemplates:
  # - metadata:
  #     name: data
  #   spec:
  #     accessModes: ["ReadWriteOnce"]
  #     resources:
  #       requests:
  #         storage: "4Gi"   # cluster state saja, tidak perlu besar
  template:
    metadata:
      labels:
        # app.kubernetes.io/name: opensearch
        # app.kubernetes.io/component: master
        # app.kubernetes.io/part-of: opensearch-cluster
        app: opensearch-cluster-manager
    spec:
      # securityContext:
      #   fsGroup: 1000
      #   runAsUser: 1000
      # terminationGracePeriodSeconds: 120
      initContainers:
      - name: config-file-manager
        image: "opensearchproject/opensearch:3.7.0"
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "cat /tmp/configfolder/common.yml /tmp/configfolder/manager.yml > /tmp/configfolder/opensearch.yml"]
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: opensearch-config-common
          mountPath: /tmp/configfolder/common.yml
          subPath: common.yml
        - name: opensearch-config-manager
          mountPath: /tmp/configfolder/manager.yml
          subPath: common.yml
        - name: config-emptydir
          mountPath: /tmp/configfolder
      containers:
      - name: opensearch
        image: "opensearchproject/opensearch:3.7.0"
        # imagePullPolicy: IfNotPresent
        # securityContext:
        #   runAsNonRoot: true
        #   runAsUser: 1000
        #   capabilities:
        #     drop: ["ALL"]
        envFrom:
          - secretRef:
              name: airflow-secret
        ports:
        - name: http
          containerPort: 9200
        - name: transport
          containerPort: 9300
        - name: metrics
          containerPort: 9600
        volumeMounts:
        - name: data
          mountPath: /usr/share/opensearch/data
        - name: config-emptydir
          mountPath: /tmp/configfolder/opensearch.yml
          subPath: opensearch.yml
        readinessProbe:
          tcpSocket:
            port: 9200
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          tcpSocket:
            port: 9200
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "1Gi"
      volumes:
      - name: opensearch-config-manager
        configMap:
          name: opensearch-config-manager
          defaultMode: 0755
      - name: opensearch-config-common
        configMap:
          name: opensearch-config-common
          defaultMode: 0755
      - name: config-emptydir
        emptyDir: {}