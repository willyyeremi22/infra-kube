---
apiVersion: v1
kind: Secret
metadata:
  name: ranger-secret-usersync
  namespace: ranger
type: Opaque
stringData:
  rangerUsersync_password: Ranger!123
  SYNC_LDAP_BIND_PASSWORD: password

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ranger-config-usersync
  namespace: ranger
data:
  POLICY_MGR_URL: http://ranger-admin.ranger.svc.cluster.local:6080
  SYNC_SOURCE: ldap
  SYNC_LDAP_URL: ldap://openldap.openldap.svc.cluster.local:389
  SYNC_LDAP_BIND_DN: uid=ranger_service,ou=people,dc=example,dc=com
  SYNC_LDAP_SEARCH_BASE: dc=example,dc=com
  SYNC_LDAP_USER_SEARCH_BASE: ou=people,dc=example,dc=com
  SYNC_LDAP_USER_NAME_ATTRIBUTE: uid
  SYNC_LDAP_USER_OBJECT_CLASS: person
  SYNC_GROUP_SEARCH_ENABLED: "true"
  SYNC_GROUP_SEARCH_BASE: ou=groups,dc=example,dc=com
  SYNC_GROUP_NAME_ATTRIBUTE: cn
  SYNC_GROUP_OBJECT_CLASS: groupOfNames
  SYNC_GROUP_MEMBER_ATTRIBUTE_NAME: member
  SYNC_GROUP_SEARCH_SCOPE: sub
  SYNC_LDAP_REFERRAL: ignore
  SYNC_LDAP_USER_SEARCH_FILTER: (objectClass=person)
  SYNC_LDAP_DELTASYNC: "false"
  SYNC_GROUP_USER_MAP_SYNC_ENABLED: "true"
  SYNC_LDAP_GROUP_SEARCH_FILTER: (objectClass=groupOfNames)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranger-usersync
  namespace: ranger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ranger-usersync
  template:
    metadata:
      labels:
        app: ranger-usersync
    spec:
      containers:
      - name: ranger-usersync
        image: apache/ranger-custom-usersync:2.8.0
        imagePullPolicy: Always
        envFrom:
          - configMapRef:
              name: ranger-config-usersync
          - secretRef:
              name: ranger-secret-usersync
        ports:
        - name: http
          containerPort: 5151

---
apiVersion: v1
kind: Service
metadata:
  name: ranger-usersync
  namespace: ranger
spec:
  type: ClusterIP
  selector:
    app: ranger-usersync
  ports:
    - name: http
      port: 5151
      targetPort: 5151