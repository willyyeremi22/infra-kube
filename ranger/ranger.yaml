---
apiVersion: v1
kind: Secret
metadata:
  name: ranger-secret-admin
  namespace: ranger
type: Opaque
stringData:
  db_root_user: postgres
  db_root_password: postgres
  db_host: postgres.rdbms.svc.cluster.local:5432
  db_name: ranger
  db_user: ranger
  db_password: ranger
  rangerAdmin_password: Ranger!123
  rangerUsersync_password: Ranger!123

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ranger-config-admin
  namespace: ranger
data:
  DB_FLAVOR: POSTGRES
  policymgr_external_url:
  audit_store: elasticsearch
  audit_elasticsearch_urls: GANTI_opensearch-host
  audit_elasticsearch_port: 9200
  audit_elasticsearch_protocol: https
  audit_elasticsearch_user: GANTI_opensearch-user
  audit_elasticsearch_password: GANTI_opensearch-password
  audit_elasticsearch_index: ranger_audits
  authentication_method: LDAP
  xa_ldap_url: ldap://GANTI_lldap-host:3890
  xa_ldap_userDNpattern: uid={0},ou=people,dc=example,dc=com
  xa_ldap_groupSearchBase: ou=groups,dc=example,dc=com
  xa_ldap_groupSearchFilter: (member={0})
  xa_ldap_base_dn: dc=example,dc=com
  xa_ldap_bind_dn: uid=svc-ranger,ou=people,dc=example,dc=com
  xa_ldap_bind_password: GANTI_password-svc-ranger
  xa_ldap_userSearchFilter: (uid={0})

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranger-admin
  namespace: ranger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ranger-admin
  template:
    metadata:
      labels:
        app: ranger-admin
    spec:
      containers:
      - name: ranger-admin
        image: apache/ranger-base:20251023-1-11
        envFrom:
          - configMapRef:
              name: ranger-config-admin
          - secretRef:
              name: ranger-secret
        command:
        - /bin/bash
        - -c
        - |
            echo "=== /opt/ranger ==="
            find /opt/ranger -maxdepth 2 -type d

            echo "=== scripts ==="
            ls -lah /home/ranger/scripts

            sleep 3600
        ports:
        - containerPort: 6080
        volumeMounts:
        - name: ranger-data
          mountPath: /opt/ranger
      volumes:
      - name: ranger-data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: ranger-admin
  namespace: ranger
spec:
  selector:
    app: ranger-admin
  ports:
    - name: http
      port: 6080
      targetPort: 6080

---
apiVersion: v1
kind: Secret
metadata:
  name: ranger-secret-usersync
  namespace: ranger
type: Opaque
stringData:
  rangerUsersync_password: Ranger!123

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ranger-config-usersync
  namespace: ranger
data:
  POLICY_MGR_URL: ranger-admin.ranger.svc.cluster.local:6080
  SYNC_SOURCE: ldap
  SYNC_LDAP_URL: ldap://ldap.example.com:389
  SYNC_LDAP_BIND_DN: cn=admin,ou=users,dc=example,dc=com
  SYNC_LDAP_BIND_PASSWORD: 
  SYNC_LDAP_SEARCH_BASE: dc=example,dc=com
  SYNC_LDAP_USER_SEARCH_BASE: ou=people,dc=example,dc=com
  SYNC_LDAP_USER_NAME_ATTRIBUTE: uid
  SYNC_GROUP_OBJECT_CLASS: groupOfNames
  SYNC_GROUP_MEMBER_ATTRIBUTE_NAME: member