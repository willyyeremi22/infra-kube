---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-config-manager
  namespace: opensearch
data:
  manager.yml: |
    node.roles: ["cluster_manager"]

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensearch-cluster-manager-pvc
  namespace: opensearch
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch-cluster-manager
  namespace: opensearch
spec:
  serviceName: opensearch-cluster-manager-headless
  replicas: 1
  podManagementPolicy: OrderedReady 
  selector:
    matchLabels:
      app: opensearch-cluster-manager
  template:
    metadata:
      labels:
        app: opensearch-cluster-manager
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      terminationGracePeriodSeconds: 120
      initContainers:
      - name: config-file-manager
        image: "opensearchproject/opensearch:3.7.0"
        # imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "cat /tmp/configfolder/common.yml /tmp/configfolder/manager.yml > /usr/share/opensearch/config/opensearch.yml"]
        volumeMounts:
        - name: opensearch-config-common
          mountPath: /tmp/configfolder/common.yml
          subPath: common.yml
        - name: opensearch-config-manager
          mountPath: /tmp/configfolder/manager.yml
          subPath: manager.yml
        - name: config-emptydir
          mountPath: /usr/share/opensearch/config
      containers:
      - name: opensearch
        image: "opensearchproject/opensearch:3.7.0"
        # imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add: ["IPC_LOCK"]
        envFrom:
          - secretRef:
              name: opensearch-secret
        ports:
        - name: http
          containerPort: 9200
        - name: transport
          containerPort: 9300
        - name: metrics
          containerPort: 9600
        volumeMounts:
        - name: opensearch-manager-data
          mountPath: /usr/share/opensearch/data
        - name: config-emptydir
          mountPath: /usr/share/opensearch/config/opensearch.yml
          subPath: opensearch.yml
        readinessProbe:
          tcpSocket:
            port: 9200
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          tcpSocket:
            port: 9200
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "1Gi"
      volumes:
      - name: opensearch-config-manager
        configMap:
          name: opensearch-config-manager
          defaultMode: 0755
      - name: opensearch-config-common
        configMap:
          name: opensearch-config-common
          defaultMode: 0755
      - name: config-emptydir
        emptyDir: {}
      - name: opensearch-manager-data
        persistentVolumeClaim:
          claimName: opensearch-manager-data

---
# === Service (ClusterIP) untuk akses ke master node ===
apiVersion: v1
kind: Service
metadata:
  name: opensearch-cluster-manager
  namespace: opensearch
spec:
  type: ClusterIP
  selector:
    app: opensearch-cluster-manager
  ports:
  - name: http
    port: 9200
  - name: transport
    port: 9300
  - name: metrics
    port: 9600

---
# === Headless Service: wajib ada, dipakai StatefulSet dan sebagai
#     titik "seed_hosts" untuk discovery oleh node data & coordinator ===
apiVersion: v1
kind: Service
metadata:
  name: opensearch-cluster-manager-headless
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: opensearch-cluster-manager
  ports:
  - name: http
    port: 9200
  - name: transport
    port: 9300
  - name: metrics
    port: 9600