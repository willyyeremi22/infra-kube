---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch-cluster-data
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: opensearch-cluster
spec:
  serviceName: opensearch-cluster-data-headless
  replicas: 1
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
      app.kubernetes.io/component: data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: "8Gi"   # sesuaikan dengan estimasi volume data
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/component: data
        app.kubernetes.io/part-of: opensearch-cluster
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      terminationGracePeriodSeconds: 120
      volumes:
      - name: config
        configMap:
          name: opensearch-cluster-config
      - name: config-emptydir
        emptyDir: {}
      initContainers:
      - name: fsgroup-volume
        image: "busybox:latest"
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "chown -R 1000:1000 /usr/share/opensearch/data"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: data
          mountPath: /usr/share/opensearch/data
      - name: configfile
        image: "opensearchproject/opensearch:3.7.0"
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "cp /tmp/configfolder/opensearch.yml /tmp/config/opensearch.yml"]
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: config-emptydir
          mountPath: /tmp/config/
        - name: config
          mountPath: /tmp/configfolder/opensearch.yml
          subPath: opensearch.yml
      containers:
      - name: opensearch
        image: "opensearchproject/opensearch:3.7.0"
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop: ["ALL"]
        ports:
        - name: http
          containerPort: 9200
        - name: transport
          containerPort: 9300
        - name: metrics
          containerPort: 9600
        readinessProbe:
          tcpSocket:
            port: 9200
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          tcpSocket:
            port: 9200
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "2Gi"
        env:
        - name: node.name
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: cluster.name
          value: "opensearch-cluster"
        - name: network.host
          value: "0.0.0.0"
        - name: discovery.seed_hosts
          value: "opensearch-cluster-master-headless"   # arah ke master, bukan diri sendiri
        - name: node.roles
          value: "data,ingest"
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xmx1024M -Xms1024M"
        volumeMounts:
        - name: data
          mountPath: /usr/share/opensearch/data
        - name: config-emptydir
          mountPath: /usr/share/opensearch/config/opensearch.yml
          subPath: opensearch.yml

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-cluster-data
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: opensearch-cluster
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: data
  ports:
  - name: http
    port: 9200
  - name: transport
    port: 9300
  - name: metrics
    port: 9600

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-cluster-data-headless
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: opensearch-cluster
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: data
  ports:
  - name: http
    port: 9200
  - name: transport
    port: 9300
  - name: metrics
    port: 9600

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch-cluster-coordinating
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: coordinating
    app.kubernetes.io/part-of: opensearch-cluster
spec:
  serviceName: opensearch-cluster-coordinating-headless
  replicas: 1
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
      app.kubernetes.io/component: coordinating
  # Tidak ada volumeClaimTemplates -- node ini tidak menyimpan data,
  # jadi cukup emptyDir (lihat volumes di bawah)
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/component: coordinating
        app.kubernetes.io/part-of: opensearch-cluster
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      terminationGracePeriodSeconds: 120
      volumes:
      - name: config
        configMap:
          name: opensearch-cluster-config
      - name: config-emptydir
        emptyDir: {}
      - name: data
        emptyDir: {}
      initContainers:
      - name: fsgroup-volume
        image: "busybox:latest"
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "chown -R 1000:1000 /usr/share/opensearch/data"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: data
          mountPath: /usr/share/opensearch/data
      - name: configfile
        image: "opensearchproject/opensearch:3.7.0"
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "cp /tmp/configfolder/opensearch.yml /tmp/config/opensearch.yml"]
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: config-emptydir
          mountPath: /tmp/config/
        - name: config
          mountPath: /tmp/configfolder/opensearch.yml
          subPath: opensearch.yml
      containers:
      - name: opensearch
        image: "opensearchproject/opensearch:3.7.0"
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop: ["ALL"]
        ports:
        - name: http
          containerPort: 9200
        - name: transport
          containerPort: 9300
        - name: metrics
          containerPort: 9600
        readinessProbe:
          tcpSocket:
            port: 9200
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          tcpSocket:
            port: 9200
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "1Gi"
        env:
        - name: node.name
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: cluster.name
          value: "opensearch-cluster"
        - name: network.host
          value: "0.0.0.0"
        - name: discovery.seed_hosts
          value: "opensearch-cluster-master-headless"
        - name: node.roles
          value: ""     # kosong = coordinating-only (bukan master/data/ingest)
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xmx512M -Xms512M"
        volumeMounts:
        - name: data
          mountPath: /usr/share/opensearch/data
        - name: config-emptydir
          mountPath: /usr/share/opensearch/config/opensearch.yml
          subPath: opensearch.yml

---
