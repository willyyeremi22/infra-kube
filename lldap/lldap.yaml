---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lldap
  namespace: lldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lldap
  template:
    metadata:
      labels:
        app: lldap
    spec:
      containers:
      - name: lldap
        image: lldap/lldap:2026-05-26
        imagePullPolicy: IfNotPresent
        ports:
        - name: ldap
          containerPort: 3890
        - name: web
          containerPort: 17170
        envFrom:
          - configMapRef:
              name: lldap-config-common
          - configMapRef:
              name: lldap-config
          - secretRef:
              name: lldap-secret
        # volumeMounts:
        # - name: data
        #   mountPath: /data
        readinessProbe:
          httpGet:
            path: /health
            port: 17170
          initialDelaySeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 17170
          initialDelaySeconds: 30
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 512Mi
      # volumes:
      # - name: data
      #   persistentVolumeClaim:
      #     claimName: lldap-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: lldap
  namespace: lldap
spec:
  selector:
    app: lldap
  ports:
  - name: ldap
    port: 389
    targetPort: 3890
  - name: web
    port: 17170
    targetPort: 17170